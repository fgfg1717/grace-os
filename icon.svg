<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#shine)"/>

  <!--
    Geometric G:
    Center (252, 260), radius 158.
    Arc from 315° (upper-right opening) counterclockwise (long way) to 0° (right-middle),
    then horizontal crossbar going left.
    Arc start: (252 + 158·cos315°, 260 + 158·sin315°) = (363.7, 148.3)
    Arc end:   (252 + 158, 260) = (410, 260)
  -->
  <path
    d="M 363.7,148.3 A 158,158 0 1 0 410,260 H 282"
    fill="none"
    stroke="white"
    stroke-width="80"
    stroke-linecap="round"
    stroke-linejoin="miter"
    stroke-miterlimit="10"/>
</svg>
