<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E2418"/>
      <stop offset="100%" stop-color="#141008"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="100%" stop-color="#A87830"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Subtle warm glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#C49040" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#C49040" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- "靜" character -->
  <text
    x="256"
    y="296"
    font-family="system-ui, -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif"
    font-size="238"
    font-weight="300"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#gold)"
    letter-spacing="-2">靜</text>
  <!-- Thin accent line below -->
  <rect x="136" y="382" width="240" height="2" rx="1" fill="#C49040" opacity="0.35"/>
</svg>
